services:
  investflow-africa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investflow-africa
    ports:
      - "10000:10000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
